<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      const repo = "/interactive-portfolio-hub";
      const current = window.location.pathname + window.location.search + window.location.hash;
      let redirect = current;

      if (redirect.startsWith(repo)) {
        redirect = redirect.slice(repo.length);
      }

      if (!redirect) {
        redirect = "/";
      }

      const destination = `${repo}/?redirect=${encodeURIComponent(redirect)}`;
      window.location.replace(destination);
    </script>
  </head>
  <body></body>
</html>
